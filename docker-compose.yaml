version: '3.6'
  
services:
  rabbitmq:
    image: rabbitmq:3.10.7-management
    tty: true
    hostname: rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=rmuser
      - RABBITMQ_DEFAULT_PASS=rmpassword
    ports:
      - 5672:5672
      - 15672:15672
      
  gatewayservice:
    image: jjnius/gateway_service
    ports:
      - "15673:15673"
    container_name: gateway_service
